<!DOCTYPE html>
<html lang="zh-Hant">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>分析師追蹤系統 — 行情儀表板</title>
<script src="lightweight-charts.js"></script>
<style>
  :root { --bg:#0d1117; --panel:#161b22; --border:#30363d; --text:#e6edf3; --muted:#8b949e;
          --up:#f0524f; --down:#3fb950; --accent:#58a6ff; }
  * { box-sizing:border-box; margin:0; padding:0; }
  body { background:var(--bg); color:var(--text); font-family:"Microsoft JhengHei",system-ui,sans-serif; padding:16px; }
  h1 { font-size:20px; margin-bottom:4px; }
  h2 { font-size:15px; color:var(--accent); margin-bottom:8px; }
  .sub { color:var(--muted); font-size:12px; margin-bottom:14px; }
  .grid { display:grid; gap:14px; grid-template-columns:1fr 1fr; }
  @media (max-width:1000px){ .grid { grid-template-columns:1fr; } }
  .panel { background:var(--panel); border:1px solid var(--border); border-radius:10px; padding:14px; }
  .panel.full { grid-column:1 / -1; }
  .chart { height:300px; }
  .chart.sm { height:230px; }
  .quotebar { display:flex; gap:20px; flex-wrap:wrap; margin-bottom:14px; }
  .qcard { background:var(--panel); border:1px solid var(--border); border-radius:10px; padding:10px 18px; min-width:190px; }
  .qcard .nm { font-size:13px; color:var(--muted); }
  .qcard .px { font-size:24px; font-weight:700; }
  .qcard .chg { font-size:13px; }
  .red { color:var(--up); } .green { color:var(--down); }
  table { width:100%; border-collapse:collapse; font-size:13px; }
  th,td { padding:5px 8px; text-align:right; border-bottom:1px solid var(--border); white-space:nowrap; }
  th { color:var(--muted); font-weight:normal; }
  td:first-child, th:first-child { text-align:left; }
  tr.clk { cursor:pointer; } tr.clk:hover { background:#1f2733; }
  .tabs { display:flex; gap:6px; margin-bottom:10px; flex-wrap:wrap; }
  .tab { padding:4px 12px; border:1px solid var(--border); border-radius:6px; cursor:pointer; font-size:13px; color:var(--muted); }
  .tab.on { color:var(--text); background:#1f2733; border-color:var(--accent); }
  input[type=text] { background:#0d1117; border:1px solid var(--border); border-radius:6px; color:var(--text); padding:7px 10px; font-size:14px; width:160px; }
  button { background:var(--accent); border:0; border-radius:6px; color:#0d1117; font-weight:700; padding:7px 16px; cursor:pointer; font-size:14px; }
  .reccard { border:1px solid var(--border); border-radius:8px; padding:10px 12px; margin-bottom:8px; cursor:pointer; }
  .reccard:hover { background:#1f2733; }
  .reccard .head { display:flex; justify-content:space-between; font-size:14px; font-weight:700; }
  .reccard .body { font-size:12px; color:var(--muted); margin-top:4px; line-height:1.7; }
  .badge { font-size:11px; padding:1px 8px; border-radius:10px; border:1px solid var(--border); }
  .stat { display:flex; gap:24px; flex-wrap:wrap; margin:8px 0; }
  .stat div { font-size:13px; color:var(--muted); }
  .stat b { color:var(--text); font-size:16px; }
  .hint { color:var(--muted); font-size:12px; padding:8px 0; }
  #stockTitle { font-size:17px; font-weight:700; }
</style>
</head>
<body>
<h1>📈 分析師追蹤系統 — 行情儀表板</h1>
<div class="sub">資料源: 證交所 / 櫃買中心 / 期交所 / 集保中心 (官方公開資料, 指數與個股報價每10秒更新)</div>

<div class="quotebar" id="quotebar"></div>

<div class="grid">
  <div class="panel"><h2>加權指數 (TAIEX) 日K</h2><div id="chTaiex" class="chart"></div></div>
  <div class="panel"><h2>櫃買指數 (TPEX) 日K</h2><div id="chTpex" class="chart"></div></div>

  <div class="panel"><h2>三大法人買賣超 (億元)</h2><div id="chInst" class="chart sm"></div>
    <div class="hint">柱=外資 · 藍線=投信 · 灰線=自營商</div></div>
  <div class="panel"><h2>散戶多空比 % (期貨未平倉)</h2><div id="chRetail" class="chart sm"></div>
    <div class="hint">橘=小型臺指(MTX) · 紫=微型臺指(TMF) · 正值偏多/負值偏空</div></div>

  <div class="panel">
    <h2>法人買賣超排行</h2>
    <div class="tabs" id="rankTabs"></div>
    <div id="rankTable"></div>
  </div>
  <div class="panel">
    <h2>推薦標的 (觀點記錄卡)</h2>
    <div id="recList"><div class="hint">載入中...</div></div>
  </div>

  <div class="panel full">
    <h2>個股查詢</h2>
    <div style="display:flex;gap:10px;align-items:center;flex-wrap:wrap;margin-bottom:10px">
      <input type="text" id="stockInput" placeholder="輸入代號, 例 2330" onkeydown="if(event.key==='Enter')loadStock()">
      <button onclick="loadStock()">查詢</button>
      <span id="stockTitle"></span><span id="stockQuote"></span>
    </div>
    <div id="stockStrategy"></div>
    <div class="grid" style="margin-top:10px">
      <div><h2>日K線</h2><div id="chStock" class="chart"></div></div>
      <div><h2>今日即時走勢 (開頁後累積)</h2><div id="chIntraday" class="chart"></div></div>
    </div>
    <div style="margin-top:14px">
      <h2>籌碼 — 集保股權分散 <span id="chipDate" class="hint"></span></h2>
      <div class="stat" id="chipStat"></div>
      <div id="chipTable" style="max-height:260px;overflow-y:auto"></div>
    </div>
  </div>
</div>

<script>
const $ = id => document.getElementById(id);
const fmt = n => n==null ? "-" : n.toLocaleString("zh-TW", {maximumFractionDigits:2});
const api = async p => { const r = await fetch("/api/"+p); return r.json(); };

const chartOpts = el => ({
  width: el.clientWidth, height: el.clientHeight,
  layout: { background:{color:"transparent"}, textColor:"#8b949e" },
  grid: { vertLines:{color:"#21262d"}, horzLines:{color:"#21262d"} },
  timeScale: { borderColor:"#30363d" }, rightPriceScale: { borderColor:"#30363d" },
});
const UP="#f0524f", DOWN="#3fb950";  // 台股習慣: 紅漲綠跌
const charts = [];
function mkChart(el){ const c = LightweightCharts.createChart(el, chartOpts(el)); charts.push([c,el]); return c; }
window.addEventListener("resize", ()=>charts.forEach(([c,el])=>c.applyOptions({width:el.clientWidth})));

function candleSeries(chart){
  return chart.addCandlestickSeries({upColor:UP, downColor:DOWN, borderUpColor:UP,
    borderDownColor:DOWN, wickUpColor:UP, wickDownColor:DOWN});
}

// ---- 指數 K線 ----
async function loadIndexCharts(){
  const [tse, otc] = await Promise.all([api("index_kline?market=tse&months=6"), api("index_kline?market=otc&months=6")]);
  candleSeries(mkChart($("chTaiex"))).setData(tse);
  if (otc.length) candleSeries(mkChart($("chTpex"))).setData(otc);
  else $("chTpex").innerHTML = '<div class="hint">櫃買歷史資料累積中 (每日快取)</div>';
}

// ---- 三大法人 ----
async function loadInst(){
  const rows = await api("institutional?days=30");
  const c = mkChart($("chInst"));
  c.addHistogramSeries({priceFormat:{type:"volume"}}).setData(
    rows.map(r=>({time:r.date, value:r.foreign, color:r.foreign>=0?UP:DOWN})));
  c.addLineSeries({color:"#58a6ff", lineWidth:2}).setData(rows.map(r=>({time:r.date, value:r.trust})));
  c.addLineSeries({color:"#8b949e", lineWidth:1}).setData(rows.map(r=>({time:r.date, value:r.dealer})));
}

// ---- 散戶多空比 ----
async function loadRetail(){
  const d = await api("retail_ratio?days=20");
  const c = mkChart($("chRetail"));
  c.addLineSeries({color:"#f0883e", lineWidth:2}).setData(d.mtx.map(r=>({time:r.date, value:r.ratio})));
  c.addLineSeries({color:"#bc8cff", lineWidth:2}).setData(d.tmf.map(r=>({time:r.date, value:r.ratio})));
  c.addLineSeries({color:"#30363d", lineWidth:1}).setData(
    (d.mtx.length?d.mtx:d.tmf).map(r=>({time:r.date, value:0})));
}

// ---- 排行 ----
const RANK_TABS = [["foreign","buy","外資買超"],["foreign","sell","外資賣超"],
                   ["trust","buy","投信買超"],["trust","sell","投信賣超"],
                   ["total","buy","三大法人買超"],["total","sell","三大法人賣超"]];
let rankData = null;
async function loadRank(){
  rankData = await api("rankings?top=10");
  $("rankTabs").innerHTML = RANK_TABS.map(([g,s,label],i)=>
    `<div class="tab${i===0?" on":""}" onclick="showRank(${i},this)">${label}</div>`).join("");
  showRank(0, $("rankTabs").children[0]);
}
function showRank(i, el){
  document.querySelectorAll("#rankTabs .tab").forEach(t=>t.classList.remove("on"));
  el.classList.add("on");
  const [g,s] = RANK_TABS[i];
  const field = g==="total" ? "total" : g;
  const rows = rankData[g][s];
  $("rankTable").innerHTML = `<table><tr><th>代號 名稱</th><th>買賣超(張)</th></tr>` +
    rows.map(r=>`<tr class="clk" onclick="loadStock('${r.code}')"><td>${r.code} ${r.name}</td>` +
      `<td class="${r[field]>=0?'red':'green'}">${fmt(r[field])}</td></tr>`).join("") +
    `</table><div class="hint">資料日期: ${rankData.date} · 點擊列可載入個股</div>`;
}

// ---- 推薦標的 ----
async function loadRecs(){
  const recs = await api("recommendations");
  if (!recs.length){ $("recList").innerHTML = '<div class="hint">尚無推薦標的。把逐字稿丟給 Claude 說「提取觀點」即可產生。</div>'; return; }
  $("recList").innerHTML = recs.map(r=>`
    <div class="reccard" onclick="loadStock('${r.code}')">
      <div class="head"><span>${r.code} ${r.name} <span class="badge ${r.direction==="買入"?"red":"green"}">${r.direction}</span></span>
        <span class="badge">信心 ${r.confidence}/10</span></div>
      <div class="body">分析師: ${r.analyst} · ${r.date}<br>
        進場: ${r.entry} · 停損: ${r.stop} · 目標: ${r.target}</div>
    </div>`).join("");
}

// ---- 指數即時報價 ----
async function refreshQuotes(){
  try{
    const qs = await api("quote?codes=t00,o00" + (curStock ? ","+curStock : ""));
    $("quotebar").innerHTML = qs.filter(q=>q.code==="t00"||q.code==="o00").map(q=>{
      const chg = q.price - q.prev_close, pct = chg/q.prev_close*100, cls = chg>=0?"red":"green";
      return `<div class="qcard"><div class="nm">${q.name}</div><div class="px ${cls}">${fmt(q.price)}</div>
        <div class="chg ${cls}">${chg>=0?"▲":"▼"} ${fmt(Math.abs(chg))} (${pct.toFixed(2)}%)</div></div>`;
    }).join("");
    const sq = qs.find(q=>q.code===curStock);
    if (sq && sq.price){
      const chg = sq.price - sq.prev_close, cls = chg>=0?"red":"green";
      $("stockTitle").textContent = `${sq.code} ${sq.name}`;
      $("stockQuote").innerHTML = ` <span class="${cls}" style="font-size:20px;font-weight:700">${fmt(sq.price)}</span>
        <span class="${cls}">${chg>=0?"▲":"▼"}${fmt(Math.abs(chg))} (${(chg/sq.prev_close*100).toFixed(2)}%)</span>`;
      if (intradaySeries){
        const now = Math.floor(Date.now()/1000);
        intradayData.push({time:now, value:sq.price});
        intradaySeries.setData(intradayData);
      }
    }
  }catch(e){}
}

// ---- 個股 ----
let curStock = null, stockChart = null, intradayChart = null, intradaySeries = null, intradayData = [];
async function loadStock(code){
  code = code || $("stockInput").value.trim();
  if (!code) return;
  $("stockInput").value = code;
  curStock = code;
  $("stockTitle").textContent = code + " 載入中...";
  $("stockStrategy").innerHTML = "";
  // 推薦策略
  const recs = await api("recommendations");
  const rec = recs.find(r=>r.code===code);
  if (rec) $("stockStrategy").innerHTML = `
    <div class="reccard" style="cursor:default;border-color:#58a6ff">
      <div class="head"><span>📋 進出場策略 — ${rec.analyst} (${rec.date})</span><span class="badge">信心 ${rec.confidence}/10</span></div>
      <div class="body">方向: <b class="${rec.direction==="買入"?"red":"green"}">${rec.direction}</b> ·
        進場條件: ${rec.entry} · 停損: ${rec.stop} · 目標: ${rec.target} · 支撐: ${rec.support||"-"}<br>${rec.note||""}</div>
    </div>`;
  // 日K
  const k = await api("stock_kline?code="+code+"&months=6");
  if (stockChart){ stockChart.remove(); charts.splice(charts.findIndex(([c])=>c===stockChart),1); }
  stockChart = mkChart($("chStock"));
  if (k.length && !k.error){
    candleSeries(stockChart).setData(k);
    const vol = stockChart.addHistogramSeries({priceFormat:{type:"volume"}, priceScaleId:""});
    stockChart.priceScale("").applyOptions({scaleMargins:{top:0.82,bottom:0}});
    vol.setData(k.map(r=>({time:r.time, value:r.volume, color:r.close>=r.open?UP+"66":DOWN+"66"})));
  } else $("stockTitle").textContent = code + " 查無K線資料";
  // 即時走勢重置
  if (intradayChart){ intradayChart.remove(); charts.splice(charts.findIndex(([c])=>c===intradayChart),1); }
  intradayChart = mkChart($("chIntraday"));
  intradayChart.applyOptions({timeScale:{timeVisible:true, secondsVisible:false}});
  intradaySeries = intradayChart.addLineSeries({color:"#58a6ff", lineWidth:2});
  intradayData = [];
  // 籌碼
  loadChips(code);
  refreshQuotes();
}

async function loadChips(code){
  $("chipStat").innerHTML = ""; $("chipTable").innerHTML = ""; $("chipDate").textContent = "";
  const d = await api("chips?code="+code);
  if (d.status === "downloading"){ $("chipTable").innerHTML = `<div class="hint">${d.message}</div>`; return; }
  if (d.error){ $("chipTable").innerHTML = `<div class="hint">${d.error}</div>`; return; }
  $("chipDate").textContent = "(資料日期 " + d.date + ", 每週更新)";
  $("chipStat").innerHTML = `
    <div>大戶持股比率 (400張以上)<br><b class="red">${d.big_holder_pct}%</b></div>
    <div>散戶持股比率 (400張以下)<br><b class="green">${d.retail_pct}%</b></div>`;
  $("chipTable").innerHTML = `<table><tr><th>持股級距(股)</th><th>人數</th><th>張數</th><th>占比%</th></tr>` +
    d.levels.map(l=>`<tr><td>${l.level}</td><td>${fmt(l.people)}</td><td>${fmt(l.lots)}</td><td>${l.pct}</td></tr>`).join("") + `</table>`;
}

// ---- 啟動 ----
loadIndexCharts(); loadInst(); loadRetail(); loadRank(); loadRecs();
refreshQuotes(); setInterval(refreshQuotes, 10000);
</script>
</body>
</html>
